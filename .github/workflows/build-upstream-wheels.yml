name: Build Upstream Rust Wheels

# Run this manually from the GitHub Actions tab when JSON Tables updates
on:
  workflow_dispatch:
    inputs:
      upstream_version:
        description: 'Tag or branch of exasol-json-tables to build (e.g., main or v1.2.0)'
        required: true
        default: 'main'

jobs:
  build-wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        target: [x86_64, aarch64]
        exclude:
          - os: windows-latest
            target: aarch64

    steps:
      # CRITICAL: We check out THEIR repository, not ours
      - name: Checkout Upstream Repo
        uses: actions/checkout@v4
        with:
          repository: exasol/exasol-json-tables
          ref: ${{ github.event.inputs.upstream_version }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build wheels via Maturin
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          manylinux: auto

      - name: Upload temporary artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: dist/*.whl

  publish-to-github-releases:
    name: Attach Wheels to Bundle Release
    needs: [build-wheels]
    runs-on: ubuntu-latest
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create 'Dependency' Release and Upload
        # This attaches the pre-compiled wheels to your exa-bundle repository
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "upstream-dependencies"
          name: "Pre-compiled Upstream Dependencies"
          files: dist/*.whl
          make_latest: false