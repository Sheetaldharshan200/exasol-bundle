name: PR Validation & Dependency Check

on:
  pull_request:
    branches: [main]

jobs:
  validate-bundle:
    name: Validate Dependencies (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false # Let all versions run even if one fails
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies and self
        run: pip install -e .
      - name: Verify Dependency Integrity
        run: pip check
      - name: Verify CLI command registers
        run: exa-bundle --help